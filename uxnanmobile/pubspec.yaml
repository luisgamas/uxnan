name: uxnan
description: "Uxnan - remote control for AI coding agents (E2EE mobile client)"
# Prevents accidental publication to pub.dev.
publish_to: 'none'

# version: <build-name>+<build-number>
version: 0.0.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

# Dependency set derived from architecture/02b-contracts-and-requirements.md (section 2).
# Feature-specific packages that require native configuration (Firebase/FCM, SSH
# terminal, QR scanner, rich-media WebView) are added in their respective module
# increments to keep the initial build green. See CHANGELOG for the deferred list.
dependencies:
  async: ^2.11.0 # reactive stream helpers
  collection: ^1.18.0 # DeepCollectionEquality, etc.
  connectivity_plus: ^6.0.0 # network connectivity changes
  cryptography: ^2.7.0 # X25519, Ed25519, HKDF
  cryptography_flutter: ^2.3.0 # native crypto acceleration
  cupertino_icons: ^1.0.8
  dio: ^5.4.0 # HTTP client for relay REST endpoints
  drift: ^2.18.0 # SQLite ORM (local persistence)
  drift_flutter: ^0.2.0 # drift Flutter integration
  equatable: ^2.0.5 # structural equality for domain objects
  firebase_core: ^3.6.0 # Firebase init (guarded; see push module)
  firebase_messaging: ^15.1.3 # FCM push tokens + messages
  flutter:
    sdk: flutter
  flutter_highlight: ^0.7.0 # code syntax highlighting
  flutter_local_notifications: ^17.2.3 # local notification display
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.0 # markdown rendering (maintained fork of flutter_markdown)
  flutter_riverpod: ^3.0.0 # state management (manual providers)
  flutter_secure_storage: ^9.2.0 # Keychain / Keystore
  flutter_svg: ^2.0.10 # SVG rendering (agent logos)
  go_router: ^14.0.0 # declarative navigation
  image_picker: ^1.1.2 # composer attach: pick image from gallery/camera
  intl: any # i18n + date formatting (pinned by flutter_localizations)
  logger: ^2.4.0 # structured logging
  mobile_scanner: ^6.0.11 # QR scanner (CameraX/MLKit, AVFoundation)
  nsd: ^5.0.1 # mDNS/Bonjour browse of _uxnan._tcp bridges (NsdManager / DNSSD)
  path_provider: ^2.1.0 # on-disk app directories
  permission_handler: ^11.3.0 # camera / notification permissions
  pointycastle: ^3.9.0 # AES-256-GCM, HKDF, SHA-256
  riverpod: ^3.0.0 # core Riverpod
  rxdart: ^0.28.0 # reactive stream operators
  share_plus: ^10.1.4 # native share sheet (theme JSON export to file)
  shared_preferences: ^2.3.0 # non-sensitive preferences
  speech_to_text: ^7.0.0 # on-device speech-to-text (composer dictation)
  uuid: ^4.4.0 # UUID generation
  web_socket_channel: ^3.0.0 # WebSocket client (LAN + relay)

dev_dependencies:
  build_runner: ^2.4.0 # drift code generation
  drift_dev: ^2.18.0 # drift code generation
  # App icon + native splash screen generation (see bottom of this file).
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0 # test doubles
  very_good_analysis: ^7.0.0 # lint ruleset (see analysis_options.yaml)

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/agents/
    - assets/animations/lottie/

  # Fonts: Inter for UI, JetBrains Mono for code (architecture 02c §3.1).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

# ----------------------------------------------------------------------------
# App launcher icons — the brand launcher mark (`logo.svg`: black mark on a
# white, rounded surface). Two rasters drive this:
#   - `logo-1024-1024.png`  : square white background + mark. Used for the
#     legacy Android icon, iOS and macOS (these platforms apply their own
#     rounded mask, and iOS rejects alpha corners — so the source must be a
#     full white square, not pre-rounded).
#   - `logo_fg_1024.png`    : padded mark on transparency, for the Android 8+
#     adaptive foreground over a flat white background layer.
# This is a mobile (Android + iOS) target only; the "PC menu" icon lives in
# the desktop app (`uxnandesktop/src-tauri/icons`).
# Re-run with `dart run flutter_launcher_icons` whenever a source SVG changes.
# ----------------------------------------------------------------------------
flutter_launcher_icons:
  image_path: "assets/images/logo-1024-1024.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_fg_1024.png"
  adaptive_icon_monochrome: "assets/images/logo_fg_1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 24

# ----------------------------------------------------------------------------
# Native splash screen — classic drawable splash on older Android + a native
# LaunchScreen storyboard on iOS. The image is the PADDED mark on a flat white
# surface (`logo_fg_1024.png`), so the mark never touches the edges.
#
# Android 12+: the system SplashScreen API is mandatory and ALWAYS shows on
# top of any Flutter-side splash. Showing a mark there too produced a visible
# "two splashes" sequence (the system mark, cropped into its circular mask,
# then a hard cut to the Flutter overlay). So we give Android 12 a fully
# TRANSPARENT icon (`splash_blank.png`) over the white window background — the
# system splash becomes a plain white screen with no mark. The brand mark then
# appears exactly once, animated, in the `UxnanSplash` overlay (`app.dart`)
# over that same white surface, so the hand-off reads as a single splash.
# Pre-Android-12 devices use the padded mark in the classic drawable splash.
# ----------------------------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  image: "assets/images/logo_fg_1024.png"
  image_dark: "assets/images/logo_fg_1024.png"
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    image: "assets/images/splash_blank.png"
    image_dark: "assets/images/splash_blank.png"
  android: true
  ios: true
  fullscreen: true

