# Uxnan mobile — static analysis configuration.
# Derived from architecture/02c-implementation-guide.md (section 15.1).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"
    - "lib/l10n/**"
  errors:
    invalid_annotation_target: ignore # freezed generates this
    missing_required_param: error
    dead_code: warning
    unused_import: error
    unused_local_variable: warning
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Style rules.
    # NOTE: the spec listed both `always_use_package_imports` and
    # `prefer_relative_imports`, which are mutually exclusive. Per the import
    # convention in 03-technical-reference.md §1.5 (full package imports), the
    # project enforces package imports and omits `prefer_relative_imports`.
    - always_use_package_imports
    - avoid_dynamic_calls
    - avoid_print
    - avoid_relative_lib_imports
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - collection_methods_unrelated_type
    - combinators_ordering
    - directives_ordering
    - eol_at_end_of_file
    - no_adjacent_strings_in_list
    - no_literal_bool_comparisons
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_final_locals
    - require_trailing_commas
    - sort_constructors_first
    - sort_pub_dependencies
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_breaks
    - unnecessary_lambdas
    - unnecessary_null_checks
    - use_colored_box
    - use_decorated_box
    - use_enums
    - use_if_null_to_convert_nulls_to_bools
    - use_string_buffers
    - use_super_parameters
