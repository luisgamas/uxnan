name: CI — Mobile (uxnanmobile · Flutter)

# Runs the reusable mobile verification on every PR and on push to main.
# A failed PR run posts a sticky comment with the failing run link (no AI).

on:
  push:
    branches: [main]
    paths:
      - "uxnanmobile/**"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/verify-mobile.yml"
  pull_request:
    paths:
      - "uxnanmobile/**"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/verify-mobile.yml"

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify-mobile.yml

  pr-comment-on-failure:
    needs: verify
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment the failure on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-mobile -->';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '### ❌ CI (Mobile) falló',
              'La verificación de `uxnanmobile` (gen-l10n / format / analyze / test) no pasó en `' + context.sha.slice(0, 7) + '`.',
              '',
              '- Detalle del error: ' + run,
              '- Reproduce local (en `uxnanmobile/`): `flutter pub get && flutter gen-l10n && flutter analyze && flutter test`',
              '',
              '_Comentario automático; se actualiza cuando cambia el resultado._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
