name: CI — Node packages (shared, bridge, relay)

# Verification gate for the npm workspaces. No secrets required.
# macOS is intentionally omitted for now (Apple work is deferred); add
# `macos-latest` to the matrix once the repo is public — see CI_CD_MONOREPOS.md §1.3.

on:
  push:
    branches: ["**"]
    paths:
      - "shared/**"
      - "bridge/**"
      - "relay/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".prettierrc.json"
      - ".github/workflows/ci-node.yml"
  pull_request:
    paths:
      - "shared/**"
      - "bridge/**"
      - "relay/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".prettierrc.json"
      - ".github/workflows/ci-node.yml"

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # node 22 (LTS) + 24 (current). node 20 is dropped: it is deprecated on
        # GitHub runners AND its `node --test` does not support glob patterns
        # (the "dist/test/**/*.test.js" arg) — that landed in node 21.
        node: ["22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (prettier)
        run: npm run format:check

      - name: Build (shared → relay → bridge)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
