name: CI — Node packages (shared, bridge, relay)

# Runs the reusable Node verification on every PR and on push to main.
# Feature-branch pushes are validated when their PR opens (saves CI minutes).
# A failed PR run posts a sticky comment with the failing run link (no AI).

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - "bridge/**"
      - "relay/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".prettierrc.json"
      - ".github/workflows/ci-node.yml"
      - ".github/workflows/verify-node.yml"
  pull_request:
    paths:
      - "shared/**"
      - "bridge/**"
      - "relay/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".prettierrc.json"
      - ".github/workflows/ci-node.yml"
      - ".github/workflows/verify-node.yml"

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify-node.yml

  pr-comment-on-failure:
    needs: verify
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment the failure on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-node -->';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '### ❌ CI (Node) failed',
              'Verification of `shared` / `bridge` / `relay` did not pass on `' + context.sha.slice(0, 7) + '`.',
              '',
              '- Failure details: ' + run,
              '- Reproduce locally: `npm ci && npm test`',
              '',
              '_Automated comment; it updates when the result changes._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
