name: Release — Mobile (Google Play, internal track)

# Builds a signed AAB on a `mobile-v<version>[+<build>]` tag and uploads it to
# the Google Play **internal** testing track. Distribution is via Google Play,
# not GitHub Releases. iOS is deferred (Apple).
#
# Tag examples:
#   mobile-v0.0.1-alpha.20260621+5  → build-name 0.0.1-alpha.20260621, code 5
#   mobile-v0.0.1-alpha.20260621    → build code falls back to the run number
#
# Required secrets (already configured): ANDROID_KEYSTORE_B64,
# ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD,
# GOOGLE_SERVICES_JSON, PLAY_SERVICE_ACCOUNT_JSON_BASE64.

on:
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: read

jobs:
  # Verify the exact tagged commit first; build + upload only if it is green.
  verify:
    uses: ./.github/workflows/verify-mobile.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: uxnanmobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Non-negotiable release rule: every uxnanmobile tag MUST ship short,
      # user-facing "What's new" notes for en-US and es-ES (≤ 500 chars each,
      # Google Play's limit). These are for END USERS — keep them non-technical;
      # the technical detail belongs in CHANGELOG.md. See CONTRIBUTING.md.
      - name: Validate Play release notes (en-US + es-ES)
        working-directory: ${{ github.workspace }}
        run: |
          fail=0
          for lang in en-US es-ES; do
            f=".github/whatsnew/whatsnew-$lang"
            if [ ! -s "$f" ]; then
              echo "::error::Missing or empty $f — a uxnanmobile release MUST include user-facing notes for en-US and es-ES."
              fail=1; continue
            fi
            chars=$(wc -m < "$f")
            if [ "$chars" -gt 500 ]; then
              echo "::error::$f has $chars chars; Google Play allows at most 500. Shorten it."
              fail=1
            fi
            if grep -qiE '^[[:space:]]*(english|español|todo|tbd|placeholder|xxx)[[:space:]]*$' "$f"; then
              echo "::error::$f still looks like a placeholder. Write real, non-technical notes for users before tagging."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Release-notes check failed. Update .github/whatsnew/whatsnew-{en-US,es-ES} (see CONTRIBUTING.md) and re-tag."
            exit 1
          fi
          echo "Release notes present and within Google Play's 500-char limit."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode signing + Play service-account secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > play-account.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Resolve version from tag
        id: meta
        run: |
          FULL="${GITHUB_REF_NAME#mobile-v}"   # 0.0.1-alpha.20260621+5
          NAME="${FULL%%+*}"                    # 0.0.1-alpha.20260621
          BUILD="${FULL#*+}"                    # 5  (or the whole string if no +)
          if [ "$BUILD" = "$FULL" ]; then BUILD="${{ github.run_number }}"; fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "build-name=$NAME  build-number=$BUILD"

      - name: Build AAB (release)
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.meta.outputs.name }}" \
            --build-number="${{ steps.meta.outputs.build }}"

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: uxnanmobile/play-account.json
          packageName: dev.luisgamas.uxnanmobile
          releaseFiles: uxnanmobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: .github/whatsnew
