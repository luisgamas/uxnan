name: CI — Desktop (uxnandesktop · Tauri 2)

# Runs the reusable desktop verification on every PR and on push to main.
# A failed PR run posts a sticky comment with the failing run link (no AI).

on:
  push:
    branches: [main]
    paths:
      - "uxnandesktop/**"
      - ".github/workflows/ci-desktop.yml"
      - ".github/workflows/verify-desktop.yml"
  pull_request:
    paths:
      - "uxnandesktop/**"
      - ".github/workflows/ci-desktop.yml"
      - ".github/workflows/verify-desktop.yml"

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify-desktop.yml
    # CI also verifies the EXPERIMENTAL macOS targets (Apple Silicon macos-14 +
    # Intel macos-13), so a Mac-only regression surfaces on the PR. The release
    # workflow keeps its gate on the default Linux + Windows pair.
    with:
      os-list: '["ubuntu-latest", "windows-latest", "macos-14", "macos-13"]'

  pr-comment-on-failure:
    needs: verify
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment the failure on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-desktop -->';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '### ❌ CI (Desktop) failed',
              'Verification of `uxnandesktop` (svelte-check / vite / cargo fmt·clippy·test) did not pass on `' + context.sha.slice(0, 7) + '`.',
              '',
              '- Failure details: ' + run,
              '- Reproduce locally (in `uxnandesktop/`): `npm ci && npm run check && cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings && cargo test --manifest-path src-tauri/Cargo.toml`',
              '',
              '_Automated comment; it updates when the result changes._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
