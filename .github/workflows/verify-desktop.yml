name: _verify-desktop (reusable)

# Reusable verification for the desktop app (svelte-check + vite + Rust
# fmt/clippy/test). Called by ci-desktop.yml (push/PR) and release-desktop.yml
# (before building installers).

on:
  workflow_call:

defaults:
  run:
    working-directory: uxnandesktop

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri/WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev libssl-dev build-essential curl wget file

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: uxnandesktop/package-lock.json

      - name: Set up Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: uxnandesktop/src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Svelte type-check
        run: npm run check

      - name: Frontend unit tests (Vitest)
        run: npm test

      - name: Frontend build (Vite)
        run: npm run build

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
