name: Release — Desktop (Tauri installers)

# Builds desktop installers on a `desktop-v<version>` tag and attaches them to a
# DRAFT GitHub Release. Windows ships UNSIGNED for now (SmartScreen warning);
# code-signing + auto-updater are deferred (see uxnandesktop/FOR-DEV.md).
# macOS is deferred with the rest of Apple — add `macos-latest` when it resumes.

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # building installers for two OSes is the slow case
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: meta
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux deps (Tauri/WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev libssl-dev build-essential curl wget file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: uxnandesktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: uxnandesktop/src-tauri

      - name: Sync version into manifests
        shell: bash
        working-directory: uxnandesktop
        run: |
          V="${{ steps.meta.outputs.version }}"   # full, e.g. 0.0.1-alpha.20260621
          # The Windows MSI target rejects a non-numeric pre-release identifier
          # (and any number > 65535), so the BUNDLE version is the numeric base
          # only. The full version still names the GitHub Release + tag.
          BASE="${V%%-*}"                          # e.g. 0.0.1
          echo "Bundle version (MSI-safe): $BASE   |   release name: $V"
          npm version "$BASE" --no-git-tag-version --allow-same-version
          node -e "const f='src-tauri/tauri.conf.json',fs=require('fs');const o=JSON.parse(fs.readFileSync(f,'utf8'));o.version='$BASE';fs.writeFileSync(f,JSON.stringify(o,null,2)+'\n')"
          perl -0pi -e 's/^version = "[^"]*"/version = "'"$BASE"'"/m' src-tauri/Cargo.toml

      - name: Install frontend deps
        working-directory: uxnandesktop
        run: npm ci

      - name: Build installers + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: uxnandesktop
          tagName: ${{ github.ref_name }}
          releaseName: "Uxnan Desktop ${{ steps.meta.outputs.version }}"
          releaseDraft: true
          prerelease: true
