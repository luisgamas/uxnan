name: Release — Desktop (Tauri installers)

# Builds desktop installers from an explicit channel tag and attaches them to a
# DRAFT GitHub Release, together with the updater artifacts (`.sig` signatures +
# a merged `latest.json`) when the signing secrets are present. The tag is the
# source of truth for the channel, so a stable build cannot accidentally become a
# nightly (or vice versa) by changing a GitHub checkbox after the build:
#   desktop-stable-v0.0.PATCH
#   desktop-nightly-v0.0.PATCH-nightly.YYYYMMDD.N
# Publishing that draft fires `release-desktop-manifest.yml`, which copies
# `latest.json` onto the matching rolling updater release.
#
# Windows ships without OS code-signing for now (SmartScreen warning) — that is a
# SEPARATE, paid certificate, unrelated to the free updater signature below.
# macOS is deferred with the rest of Apple — add `macos-latest` when it resumes.
#
# FOR-HUMAN: the updater signature needs two repo secrets (free; generate with
# `npx tauri signer generate`). Without them the build still succeeds, just
# without `.sig`/`latest.json`, so the in-app updater can't verify/apply updates:
#   - TAURI_SIGNING_PRIVATE_KEY           (contents of the generated private key)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (its password; empty string if none)
# Also replace `plugins.updater.pubkey` in src-tauri/tauri.conf.json with the
# matching public key. See uxnandesktop/docs/updates.md → "First-time setup".

on:
  push:
    tags:
      - 'desktop-stable-v*'
      - 'desktop-nightly-v*'

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  # Verify the exact tagged commit first; build installers only if it is green.
  verify:
    uses: ./.github/workflows/verify-desktop.yml

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # building installers for two OSes is the slow case
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps (Tauri/WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev libssl-dev build-essential curl wget file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: uxnandesktop/package-lock.json

      - name: Resolve and validate release channel from tag
        id: meta
        shell: bash
        run: node uxnandesktop/scripts/desktop-release-tag.mjs "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: uxnandesktop/src-tauri

      - name: Sync version into manifests
        shell: bash
        working-directory: uxnandesktop
        run: |
          V="${{ steps.meta.outputs.version }}"   # stable: 0.0.10; nightly: 0.0.11-nightly.20260712.1
          # The Windows MSI target rejects a non-numeric pre-release identifier
          # (and any number > 65535), so the BUNDLE version is the numeric base
          # only. The full version still names the GitHub Release + tag.
          BASE="${V%%-*}"                          # e.g. 0.0.1
          echo "Bundle version (MSI-safe): $BASE   |   release name: $V"
          # Embed the FULL release name for the app to display (the bundle keeps
          # the numeric base; see updater::app_version). Read at compile time via
          # option_env!("UXNAN_VERSION").
          echo "UXNAN_VERSION=$V" >> "$GITHUB_ENV"
          npm version "$BASE" --no-git-tag-version --allow-same-version
          node -e "const f='src-tauri/tauri.conf.json',fs=require('fs');const o=JSON.parse(fs.readFileSync(f,'utf8'));o.version='$BASE';fs.writeFileSync(f,JSON.stringify(o,null,2)+'\n')"
          perl -0pi -e 's/^version = "[^"]*"/version = "'"$BASE"'"/m' src-tauri/Cargo.toml

      - name: Install frontend deps
        working-directory: uxnandesktop
        run: npm ci

      - name: Build installers + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signature (free minisign key). When set, tauri-action emits a
          # `.sig` per installer and a merged `latest.json`; when unset it builds
          # the same installers without them. NOT OS code-signing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: uxnandesktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Uxnan Desktop ${{ steps.meta.outputs.version }}'
          releaseDraft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
