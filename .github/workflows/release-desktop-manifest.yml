name: Release — Desktop updater manifest

# Publishes the in-app updater's per-channel manifest. The desktop updater polls
# a STABLE url per channel:
#   https://github.com/<owner>/<repo>/releases/download/desktop-updater-<channel>/latest.json
# (see uxnandesktop/src-tauri/src/updater.rs `endpoint_for`). This workflow keeps
# that file current: when you PUBLISH an explicitly-channelled Desktop Release
# (the draft `release-desktop.yml` created), it reads the merged `latest.json`
# attached to that release and copies it onto the matching rolling channel
# release, creating that release on first use. The tag determines the channel;
# this workflow rejects a Release whose GitHub pre-release flag disagrees:
#   desktop-stable-v0.0.PATCH                       -> stable, prerelease=false
#   desktop-nightly-v0.0.PATCH-nightly.YYYYMMDD.N   -> nightly, prerelease=true
#
# Trigger is `release: published` (not the tag push) so the version release's
# assets are already public — the URLs inside latest.json resolve. Until the
# updater signing secrets exist, the source release has no `latest.json` and this
# job exits cleanly with a notice (nothing to publish). See docs/updates.md.

on:
  release:
    types: [published]

permissions:
  contents: write # create/update the rolling channel release + upload the asset

jobs:
  publish-manifest:
    # Only explicitly-channelled desktop releases; ignore the rolling channel
    # releases themselves, legacy tags, and every other component's tags.
    if: startsWith(github.event.release.tag_name, 'desktop-stable-v') || startsWith(github.event.release.tag_name, 'desktop-nightly-v')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.event.release.tag_name }}
      IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - name: Checkout the tagged release contract
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve and validate channel from tag
        id: meta
        shell: bash
        run: |
          node uxnandesktop/scripts/desktop-release-tag.mjs "$TAG" >> "$GITHUB_OUTPUT"
          . "$GITHUB_OUTPUT"
          if [ "$IS_PRERELEASE" != "$prerelease" ]; then
            echo "::error::Release $TAG declares channel '$channel', which requires prerelease=$prerelease; GitHub Release has prerelease=$IS_PRERELEASE."
            exit 1
          fi
          echo "Release $TAG validated as channel '$channel' (prerelease=$IS_PRERELEASE)."

      - name: Download latest.json from the published release
        id: fetch
        shell: bash
        run: |
          if gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p latest.json -D . 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No latest.json on $TAG — updater signing secrets are probably not configured yet; skipping manifest publish."
          fi

      - name: Publish manifest to the rolling channel release
        if: steps.fetch.outputs.found == 'true'
        shell: bash
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          rolling="desktop-updater-$CHANNEL"
          prerelease_flag=""
          [ "$CHANNEL" = "stable" ] || prerelease_flag="--prerelease"
          # Create the rolling release once; ignore the error if it already exists.
          if ! gh release view "$rolling" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # --latest=false so this internal channel-manifest release never
            # claims the repo's "Latest" badge — that belongs to the real
            # desktop-v* version release.
            gh release create "$rolling" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Uxnan Desktop — $CHANNEL channel manifest" \
              --notes "Auto-maintained updater manifest for the $CHANNEL channel. Do not delete; the in-app updater downloads latest.json from here." \
              $prerelease_flag \
              --latest=false \
              --target "${GITHUB_SHA}"
          fi
          gh release upload "$rolling" latest.json --repo "$GITHUB_REPOSITORY" --clobber
          echo "Published latest.json to $rolling"
