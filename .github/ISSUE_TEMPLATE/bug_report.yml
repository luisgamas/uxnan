name: 🐞 Bug report
description: Report a defect in one or more Uxnan components.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Be specific** — the more detail (component,
        exact steps, error output, OS, version), the faster it gets fixed.

        🔒 **Security vulnerability?** Do **not** file it here. Use the private
        reporting flow in `SECURITY.md`.

  - type: dropdown
    id: components
    attributes:
      label: Affected component(s)
      description: Which monorepo project(s) does this affect? Select all that apply.
      multiple: true
      options:
        - "shared — contracts / JSON-RPC / E2EE schemas"
        - "bridge — PC daemon (uxnan-bridge)"
        - "relay — E2EE relay server (uxnan-relay)"
        - "uxnandesktop — Tauri desktop app"
        - "uxnanmobile — Flutter mobile app"
        - "Not sure / cross-cutting"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact, minimal steps so we can reproduce it.
      placeholder: |
        1. Run '...'
        2. Open '...'
        3. Tap '...'
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error messages / logs
      description: Paste any visible error message, stack trace, console or device log. Auto-formatted as code — no backticks needed.
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating system / platform
      description: Where did it happen? Select all that apply.
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Component version(s)
      description: "e.g. uxnan-bridge 0.0.1-alpha.20260621, desktop installer 0.0.1, mobile build 20260621, OS version."
    validations:
      required: true

  - type: input
    id: install
    attributes:
      label: How was it installed / built?
      description: "e.g. npm i -g, GitHub Release installer (.msi/.deb), built from source, Google Play."

  - type: textarea
    id: context
    attributes:
      label: Where/how did you find it? Additional context
      description: What were you doing when it happened? Screenshots, config, frequency (always / intermittent), anything else.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is NOT a security vulnerability (those go through SECURITY.md, not public issues).
          required: true
