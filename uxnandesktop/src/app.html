<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Uxnan Desktop</title>
    <style>
      /* Brand splash painted by the webview the instant the document loads —
         before SvelteKit hydrates — so the user never sees the empty white/
         black window during startup. The mark springs in (70% → 100% while
         untwisting a half-turn), then `+layout.svelte` adds `.done` on first
         paint to fade it out. Theme is best-effort from the OS preference
         (the real app theme is applied a frame later, by which point this
         overlay is already fading). Inline SVG with `currentColor` keeps it a
         zero-request, instant paint. */
      #uxnan-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #000000;
        transition: opacity 0.45s ease;
      }
      #uxnan-splash svg {
        width: 120px;
        height: 120px;
        animation: uxnan-splash-in 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      @keyframes uxnan-splash-in {
        from {
          transform: scale(0.7) rotate(180deg);
        }
        to {
          transform: scale(1) rotate(0deg);
        }
      }
      #uxnan-splash.done {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-color-scheme: dark) {
        #uxnan-splash {
          background: #0b0b0c;
          color: #ffffff;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <div id="uxnan-splash" aria-hidden="true">
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M92.7354 149.462C92.7354 149.462 79.9056 332.283 102.357 349.389C124.809 366.495 141.915 363.288 161.16 360.081C180.404 356.873 221.031 331.214 230.653 308.762C240.275 286.311 216.755 175.121 230.653 156.946C244.552 138.771 311.907 119.526 301.216 106.697C290.525 93.8674 272.349 77.8304 253.105 78.8995C233.86 79.9686 178.266 113.112 161.16 134.494C144.054 155.877 161.16 292.726 161.16 292.726"
          stroke="currentColor"
          stroke-width="23.8959"
          stroke-linecap="round"
        />
        <path
          d="M419.267 362.539C419.267 362.539 432.096 179.718 409.645 162.612C387.193 145.506 370.087 148.713 350.842 151.921C331.598 155.128 290.971 180.787 281.349 203.239C271.727 225.69 295.248 336.88 281.349 355.055C267.45 373.23 200.095 392.475 210.786 405.304C221.478 418.134 239.653 434.171 258.897 433.102C278.142 432.033 333.736 398.89 350.842 377.507C367.948 356.124 350.842 219.276 350.842 219.276"
          stroke="currentColor"
          stroke-width="23.8959"
          stroke-linecap="round"
        />
      </svg>
    </div>
    <script>
      // Dismiss the splash once SvelteKit signals first paint (see
      // `+layout.svelte`). Fallback timer guarantees it never lingers if the
      // app fails to call back.
      (function () {
        function done() {
          var s = document.getElementById("uxnan-splash");
          if (!s) return;
          s.classList.add("done");
          setTimeout(function () {
            if (s) s.remove();
          }, 550);
        }
        window.__uxnanSplashDone = done;
        setTimeout(done, 4000);
      })();
    </script>
  </body>
</html>
