[package]
name = "uxnan-desktop"
version = "0.0.0"
description = "Uxnan Desktop — Agent Development Environment (ADE)."
authors = ["Uxnan"]
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "uxnan_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-notification = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "fs", "process", "macros"] }
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
portable-pty = "0.9"
sysinfo = "0.33"
axum = { version = "0.8", default-features = false, features = ["json", "tokio", "http1"] }

# Windows-only: SetThreadExecutionState for the keep-awake feature (power.rs).
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_System_Power"] }

[dev-dependencies]
tempfile = "3"
